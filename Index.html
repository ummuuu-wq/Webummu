<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Latihan HTML</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 30px;
            background-color: #FFC5C5;
        }
        
        h {
           color: #3c5e40
         }

        h1 {
            color: #2c3e50;
        }
        
        h2 {
            color: #87CEEB
        }
        
        h3 {
            color: #FFFFCC
        }

        .box {
            background-color: lavender;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 10px 10px 5px rgba(136,136,136,0.5);
        }
 

        img {
            max-width: 40%;
            border-radius: 10px;
        }

        a {
            color: #ff0000;
            text-decoration: underline;
        }

        button {
            background-color: #add8e6;
            color: black;
            padding: 10px 15px;
            border: 1px solid #000;
            box-shadow: 0 0 5px #000;
            border-radius: 5px;
            cursor: penunjuk;
        }

        button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Halo SISWA SISWI SMK COKRO!</h1>
        <p>Ini adalah halaman HTML latihan yang bisa kamu kembangkan sendiri.</p>

        <h2>Gambar</h2>
        <img src="smk.jpg" alt="smk.jpg">

        <h2>Link</h2>
        <p>Kunjungi <a href="https://www.html.com" target="ummu 1.html">html</a>.</p>

        <h2>Tombol Interaktif</h2>
        <button onclick="open('silahkan di klik')">Klik Saya</button>
        <button id="button">Klik saya</button>    
        <h2>Gambar</h2>
        <img src="smk.jpg" alt="smk.jpg">https://github.com/ummuuu-wq/Webummu.git
    </div>

</body>
</html>
